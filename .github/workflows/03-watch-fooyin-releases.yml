name: 03. Watch Fooyin Releases

on:
  schedule:
    # Проверять каждые 6 часов
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest Fooyin release
        id: get-latest-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: 'fooyin',
              repo: 'fooyin'
            });

            if (releases.length > 0) {
              const latestRelease = releases[0];
              core.setOutput('tag_name', latestRelease.tag_name);
              core.setOutput('html_url', latestRelease.html_url);
              core.info(`Latest Fooyin release: ${latestRelease.tag_name}`);
            } else {
              core.setFailed('No releases found for fooyin/fooyin');
            }

      - name: Check if AppImage release already exists
        id: check-artifact
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = '${{ steps.get-latest-release.outputs.tag_name }}';
            const expectedTag = `fooyin-${tagName}-appimage`;
            core.info(`Checking for existing release with tag: ${expectedTag}`);

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: expectedTag
              });
              core.info(`Release ${expectedTag} already exists — skipping build.`);
              core.setOutput('check_result', 'found');
            } catch (error) {
              if (error.status === 404) {
                core.info(`Release ${expectedTag} not found — triggering build.`);
                core.setOutput('check_result', 'not_found');
              } else {
                core.setFailed(`Unexpected error checking release: ${error.message}`);
              }
            }

      - name: Trigger AppImage build
        if: steps.check-artifact.outputs.check_result == 'not_found'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '02-build-fooyin-appimage.yml',
              ref: 'main',
              inputs: {
                fooyin_ref: '${{ steps.get-latest-release.outputs.tag_name }}'
              }
            });
            core.info(`Triggered build for Fooyin ${{ steps.get-latest-release.outputs.tag_name }}`);
