name: 02. Build Fooyin AppImage

on:
  workflow_dispatch:
    inputs:
      fooyin_ref:
        description: 'Fooyin Git ref (tag/branch/commit, e.g., v0.9.1 or master)'
        required: true
        default: 'master'
  workflow_call:
    inputs:
      fooyin_ref:
        description: 'Fooyin Git ref (tag/branch/commit, e.g., v0.9.1 or master)'
        type: string
        required: true
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  QT_VERSION: "6.8.0"
  FFMPEG_VERSION: "7.1.2"
  INSTALL_PREFIX: ${{ github.workspace }}/AppDir
  FOYIN_SOURCE_DIR: ${{ github.workspace }}/fooyin
  BUILD_DIR: ${{ github.workspace }}/build_env
  CACHE_KEY: "build-env-qt6.8.0-ffmpeg7.1.2-v4"
  QT_BASE_URL: "https://download.qt.io/online/qtsdkrepository/linux_x64/desktop/qt6_680/qt6_680/qt.qt6.680.linux_gcc_64"
  QT_ARCHIVES: >
    6.8.0-0-202410030750icu-linux-Rhel8.6-x86_64.7z
    6.8.0-0-202410030750qtbase-Linux-RHEL_8_8-GCC-Linux-RHEL_8_8-X86_64.7z
    6.8.0-0-202410030750qtsvg-Linux-RHEL_8_8-GCC-Linux-RHEL_8_8-X86_64.7z
    6.8.0-0-202410030750qtwayland-Linux-RHEL_8_8-GCC-Linux-RHEL_8_8-X86_64.7z
    6.8.0-0-202410030750qttranslations-Linux-RHEL_8_8-GCC-Linux-RHEL_8_8-X86_64.7z
    6.8.0-0-202410030750qttools-Linux-RHEL_8_8-GCC-Linux-RHEL_8_8-X86_64.7z
    6.8.0-0-202410030750qtdeclarative-Linux-RHEL_8_8-GCC-Linux-RHEL_8_8-X86_64.7z
    6.8.0-0-202410030750meta.7z

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - name: Checkout this repo (for recipe.yml)
        uses: actions/checkout@v4

      - name: Determine Fooyin ref
        id: determine-ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ inputs.fooyin_ref }}"
          elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            REF="${{ inputs.fooyin_ref }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REF="master"
          else
            REF="master"
          fi
          echo "REF=$REF" >> $GITHUB_ENV
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Checkout Fooyin source
        uses: actions/checkout@v4
        with:
          repository: fooyin/fooyin
          ref: ${{ env.REF }}
          path: ${{ env.FOYIN_SOURCE_DIR }}

      - name: Setup directories
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          mkdir -p ${{ env.INSTALL_PREFIX }}
          mkdir -p ${{ env.INSTALL_PREFIX }}/share/applications
          mkdir -p ${{ env.INSTALL_PREFIX }}/share/icons/hicolor/256x256/apps

      # --- ВОССТАНОВЛЕНИЕ КЭША СРЕДЫ (без fail-on-cache-miss) ---
      - name: Restore cached build environment
        uses: actions/cache/restore@v4
        id: restore-env
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: ${{ env.CACHE_KEY }}

      - name: Report cache status
        run: |
          if [ "${{ steps.restore-env.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Cache HIT: используем готовое окружение из кэша"
          else
            echo "⚠️ Cache MISS: будем собирать Qt/FFmpeg/TagLib с нуля"
          fi

      # ============================================================
      # FALLBACK: сборка окружения если кэш не найден
      # ============================================================

      - name: "[Fallback] Install build tools and dependencies"
        if: steps.restore-env.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y \
            gcc-13 g++-13 \
            p7zip-full wget curl build-essential yasm nasm \
            cmake ninja-build pkg-config git \
            zlib1g-dev libicu-dev libxkbcommon-dev libglu1-mesa-dev \
            libasound2-dev libpipewire-0.3-dev libsdl2-dev \
            libsndfile1-dev libopenmpt-dev libgme-dev \
            libarchive-dev libebur128-dev libsoundtouch-dev libsoxr-dev \
            libutfcpp-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo update-alternatives --set gcc /usr/bin/gcc-13
          sudo update-alternatives --set g++ /usr/bin/g++-13
          gcc --version && g++ --version

      - name: "[Fallback] Download and install prebuilt Qt"
        if: steps.restore-env.outputs.cache-hit != 'true'
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          IFS=' ' read -r -a archives <<< "${{ env.QT_ARCHIVES }}"
          for archive in "${archives[@]}"; do
            [ -z "$archive" ] && continue
            echo "Downloading $archive..."
            wget -q "${{ env.QT_BASE_URL }}/$archive"
            7z x "$archive"
            rm -f "$archive"
          done
          QT_SOURCE_DIR=$(find . -maxdepth 2 -type d -name "gcc_64" | head -n 1)
          if [ -z "$QT_SOURCE_DIR" ]; then
            echo "Error: gcc_64 not found"; ls -la; exit 1
          fi
          cp -r "$QT_SOURCE_DIR"/* ${{ env.INSTALL_PREFIX }}/
          chmod +x ${{ env.INSTALL_PREFIX }}/bin/qmake || true
          ${{ env.INSTALL_PREFIX }}/bin/qmake -v

      - name: "[Fallback] Build and install FFmpeg"
        if: steps.restore-env.outputs.cache-hit != 'true'
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          wget -q https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz
          tar xf ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz
          cd ffmpeg-${{ env.FFMPEG_VERSION }}
          ./configure \
            --prefix=${{ env.INSTALL_PREFIX }} \
            --enable-shared --disable-static --disable-doc \
            --enable-pic --cc=gcc-13 --cxx=g++-13
          make -j$(nproc)
          make install

      - name: "[Fallback] Build and install TagLib"
        if: steps.restore-env.outputs.cache-hit != 'true'
        run: |
          cd ${{ env.BUILD_DIR }}
          LATEST_JSON=$(curl -s https://api.github.com/repos/taglib/taglib/releases/latest)
          TAGLIB_URL=$(echo "$LATEST_JSON" | jq -r '.tarball_url')
          TAGLIB_VER=$(echo "$LATEST_JSON" | jq -r '.tag_name')
          [ -z "$TAGLIB_URL" ] || [ "$TAGLIB_URL" == "null" ] && echo "Error: no taglib url" && exit 1
          wget -O taglib-${TAGLIB_VER}.tar.gz "$TAGLIB_URL"
          tar -xzf taglib-${TAGLIB_VER}.tar.gz
          TAGLIB_SRC=$(find . -maxdepth 1 -type d -name "taglib-*" | grep -v '\.tar' | head -n 1)
          cd "$TAGLIB_SRC"
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_PREFIX }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DBUILD_SHARED_LIBS=ON
          make -j$(nproc)
          make install

      - name: "[Fallback] Save built environment to cache"
        if: steps.restore-env.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: ${{ env.CACHE_KEY }}

      # ============================================================
      # ДАЛЬНЕЙШАЯ СБОРКА (GCC, зависимости, Fooyin, AppImage)
      # ============================================================

      - name: Verify build environment
        run: |
          if [ -f "${{ env.INSTALL_PREFIX }}/bin/qmake" ]; then
            echo "✅ Qt qmake found:"
            ${{ env.INSTALL_PREFIX }}/bin/qmake -v
          else
            echo "❌ qmake not found in ${{ env.INSTALL_PREFIX }}/bin/"
            exit 1
          fi
          if [ -f "${{ env.INSTALL_PREFIX }}/lib/libavcodec.so" ]; then
            echo "✅ FFmpeg libraries found."
          else
            echo "❌ FFmpeg libraries not found."
            exit 1
          fi

      # --- УСТАНОВКА GCC-13 ---
      - name: Install GCC-13
        run: |
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo update-alternatives --set gcc /usr/bin/gcc-13
          sudo update-alternatives --set g++ /usr/bin/g++-13
          gcc --version && g++ --version

      # --- УСТАНОВКА СИСТЕМНЫХ ЗАВИСИМОСТЕЙ ДЛЯ FOOYIN ---
      - name: Install system dependencies for Fooyin build
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          sudo apt-get install -y \
            binutils coreutils desktop-file-utils \
            fakeroot fuse libgdk-pixbuf2.0-dev \
            patchelf python3-pip python3-setuptools \
            squashfs-tools strace util-linux zsync \
            libgl1-mesa-dev libglu1-mesa-dev \
            mesa-common-dev freeglut3-dev \
            build-essential cmake git pkg-config \
            libxkbcommon-dev libvulkan-dev \
            libgme-dev libarchive-dev \
            libopenmpt-dev libpipewire-0.3-dev \
            libsdl2-dev libsndfile1-dev \
            libebur128-dev ccache libxcb-cursor0
          pip3 install --upgrade pip
          pip3 index versions appimage-builder
          pip3 install appimage-builder==1.1.0
          pip3 install packaging==21.3
          python3.10 -m appimagebuilder --version

      # --- ВОССТАНОВЛЕНИЕ КЭША CCACHE ---
      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/ccache
          key: ccache-${{ runner.os }}-${{ env.QT_VERSION }}-${{ env.FFMPEG_VERSION }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ env.QT_VERSION }}-
            ccache-${{ runner.os }}-

      - name: Setup ccache
        run: |
          mkdir -p ${{ github.workspace }}/ccache
          echo "CCACHE_DIR=${{ github.workspace }}/ccache" >> $GITHUB_ENV
          echo "CCACHE_BASEDIR=${{ github.workspace }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=2G" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          ccache -s

      # --- СБОРКА FOOYIN ---
      - name: Build Fooyin
        run: |
          cd ${{ env.FOYIN_SOURCE_DIR }}
          mkdir -p build && cd build
          ccache -s

          cmake .. \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_PREFIX }} \
            -DCMAKE_PREFIX_PATH=${{ env.INSTALL_PREFIX }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

          cmake --build . --parallel 1
          cmake --build . --parallel 1 --target install

          find $INSTALL_PREFIX -name fooyin -type f
          echo "Fooyin build/install completed."
          ccache -s

      # --- ПОДГОТОВКА AppDir ---
      - name: Prepare AppDir (Desktop file and icon)
        run: |
          cp "$INSTALL_PREFIX/share/icons/hicolor/256x256/apps/org.fooyin.fooyin.png" "$INSTALL_PREFIX/share/icons/hicolor/256x256/apps/fooyin.png"
          cp "$INSTALL_PREFIX/share/applications/org.fooyin.fooyin.desktop" "$INSTALL_PREFIX/share/applications/fooyin.desktop"
          mkdir -p "$INSTALL_PREFIX/usr/share/icons/hicolor/256x256/apps/"
          mkdir -p "$INSTALL_PREFIX/usr/share/applications/"
          cp "$INSTALL_PREFIX/share/icons/hicolor/256x256/apps/org.fooyin.fooyin.png" "$INSTALL_PREFIX/usr/share/icons/hicolor/256x256/apps/fooyin.png"
          cp "$INSTALL_PREFIX/share/applications/org.fooyin.fooyin.desktop" "$INSTALL_PREFIX/usr/share/applications/fooyin.desktop"
          cp "$INSTALL_PREFIX/share/icons/hicolor/256x256/apps/org.fooyin.fooyin.png" "$INSTALL_PREFIX/usr/share/icons/hicolor/256x256/apps/org.fooyin.fooyin.png"
          cp "$INSTALL_PREFIX/share/applications/org.fooyin.fooyin.desktop" "$INSTALL_PREFIX/usr/share/applications/org.fooyin.fooyin.desktop"
          cp "$INSTALL_PREFIX/share/icons/hicolor/256x256/apps/org.fooyin.fooyin.png" "$INSTALL_PREFIX/usr/share/icons/hicolor/256x256/apps/org.fooyin.Fooyin.png"
          cp "$INSTALL_PREFIX/share/applications/org.fooyin.fooyin.desktop" "$INSTALL_PREFIX/usr/share/applications/org.fooyin.Fooyin.desktop"
          ls -la "$INSTALL_PREFIX/bin/"
          ls -la "$INSTALL_PREFIX/share/icons/hicolor/256x256/apps/"
          ls -la "$INSTALL_PREFIX/share/applications/"

      - name: Set Version from REF
        id: set-version
        run: |
          VERSION="${{ env.REF }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Using REF as version: $VERSION"

      - name: Build AppImage
        run: |
          export VERSION=${{ env.VERSION }}
          appimage-builder --recipe recipe.yml --skip-test

      - name: Check AppImage files
        run: |
          echo "📦 Generated AppImage files:"
          ls -la Fooyin-*.AppImage*

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fooyin-${{ env.VERSION }}-AppImage
          path: |
            Fooyin-*-x86_64.AppImage
            Fooyin-*-x86_64.AppImage.zsync

      # --- СОХРАНЕНИЕ CCACHE ---
      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/ccache
          key: ccache-${{ runner.os }}-${{ env.QT_VERSION }}-${{ env.FFMPEG_VERSION }}

      - name: Delete old ccache (rotate)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const cacheKey = 'ccache-${{ runner.os }}-${{ env.QT_VERSION }}-${{ env.FFMPEG_VERSION }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              const response = await github.rest.actions.getActionsCacheList({ owner, repo, per_page: 100 });
              const matching = response.data.actions_caches
                .filter(c => c.key === cacheKey)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              for (const cache of matching.slice(1)) {
                await github.rest.actions.deleteActionsCacheById({ owner, repo, cache_id: cache.id });
                console.log(`✅ Deleted stale ccache ID ${cache.id}`);
              }
              if (matching.length <= 1) console.log('ℹ️ No stale entries.');
            } catch (e) { console.error(`❌ ${e.message}`); }

      - name: Create GitHub Release
        if: ${{ success() }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fooyin-${{ env.VERSION }}-appimage
          name: "Fooyin ${{ env.VERSION }} (AppImage)"
          body: |
            Automatic AppImage build for Fooyin ${{ env.VERSION }}

            **Build Details:**
            - **Fooyin Version:** ${{ env.VERSION }} (Auto build from source code)
            - **Qt Version:** ${{ env.QT_VERSION }} (Prebuilt binary)
            - **FFmpeg Version:** ${{ env.FFMPEG_VERSION }} (Auto build from source code)
            - **Build Date:** ${{ github.event.head_commit.timestamp }}

            Built from ref: ${{ env.REF }}
          files: |
            Fooyin-*-x86_64.AppImage
            Fooyin-*-x86_64.AppImage.zsync
          prerelease: ${{ !contains(env.VERSION, 'v') && env.VERSION != 'master' }}
          draft: false
